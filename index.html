<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VK Bot Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            background: #667eea;
            color: white;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .info {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
        }
        
        .status {
            background: #e6fffa;
            border-left: 4px solid #38b2ac;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 VK Bot Helper</h1>
        
        <button onclick="sendToBot()">💬 Отправить сообщение боту</button>
        <button onclick="sendNote()">📝 Отправить заметку</button>
        <button onclick="sendWeather()">🌤 Узнать погоду</button>
        <button onclick="closeApp()">❌ Закрыть приложение</button>
        
        <div class="info" id="userInfo">
            Загрузка информации...
        </div>
        
        <div class="status" id="status">
            ✅ Приложение готово
        </div>
    </div>
    
    <script src="https://vk.com/js/api/openapi.js?169"></script>
    <script>
        // ID вашего приложения
        var APP_ID = 54495928;
        
        // Инициализация VK
        VK.init({
            apiId: APP_ID
        });
        
        // Функция для обновления статуса
        function updateStatus(text, isError) {
            var statusDiv = document.getElementById("status");
            statusDiv.innerHTML = text;
            if (isError) {
                statusDiv.style.background = "#fed7d7";
                statusDiv.style.borderLeftColor = "#fc8181";
            } else {
                statusDiv.style.background = "#e6fffa";
                statusDiv.style.borderLeftColor = "#38b2ac";
            }
        }
        
        // Получаем информацию о пользователе
        VK.callMethod("VKWebAppGetUserInfo", {}, function(data) {
            console.log("Данные пользователя:", data);
            if (data && data.id) {
                document.getElementById("userInfo").innerHTML = 
                    "👤 Ваш ID: " + data.id + "<br>" +
                    "👋 Привет, " + data.first_name + " " + data.last_name;
                updateStatus("✅ Приложение работает! ID: " + data.id);
            } else {
                document.getElementById("userInfo").innerHTML = "⚠️ Не удалось получить данные";
                updateStatus("⚠️ Ошибка получения данных", true);
            }
        });
        
        // Отправка сообщения боту
        function sendToBot() {
            var message = prompt("Введите сообщение для бота:", "привет");
            if (message) {
                VK.callMethod("VKWebAppSendMessage", {
                    "message": message
                }, function(result) {
                    console.log("Сообщение отправлено:", result);
                    updateStatus("✅ Сообщение отправлено: " + message);
                    setTimeout(function() {
                        updateStatus("✅ Приложение готово");
                    }, 2000);
                });
            }
        }
        
        // Отправка заметки
        function sendNote() {
            var note = prompt("Введите текст заметки:");
            if (note) {
                VK.callMethod("VKWebAppSendMessage", {
                    "message": "заметка " + note
                }, function() {
                    updateStatus("✅ Заметка отправлена боту!");
                    setTimeout(function() {
                        updateStatus("✅ Приложение готово");
                    }, 2000);
                });
            }
        }
        
        // Запрос погоды
        function sendWeather() {
            var city = prompt("Введите город:", "Москва");
            if (city) {
                VK.callMethod("VKWebAppSendMessage", {
                    "message": "погода " + city
                }, function() {
                    updateStatus("🌤 Запрос погоды отправлен!");
                    setTimeout(function() {
                        updateStatus("✅ Приложение готово");
                    }, 2000);
                });
            }
        }
        
        // Закрытие приложения
        function closeApp() {
            VK.callMethod("VKWebAppClose", {"status": "success"});
        }
        
        // Получаем параметры запуска
        VK.callMethod("VKWebAppGetLaunchParams", {}, function(params) {
            console.log("Параметры запуска:", params);
        });
        
        // Проверка, что VK API загружен
        console.log("VK API загружен, APP_ID:", APP_ID);
        updateStatus("✅ Приложение инициализировано");
    </script>
</body>
</html>
