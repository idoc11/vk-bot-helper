<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VK Bot Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }
        h1 { text-align: center; color: #333; }
        .info { background: #f0f0f0; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 VK Bot Helper</h1>
        
        <button onclick="sendToBot()">💬 Написать боту</button>
        <button onclick="sendNote()">📝 Отправить заметку</button>
        <button onclick="sendWeather()">🌤 Узнать погоду</button>
        
        <div class="info" id="info">
            👋 Привет! Нажми на кнопку, чтобы написать боту
        </div>
    </div>
    
    <script>
        // ID сообщества (куда отправлять сообщения)
        // Нужно заменить на ID вашего сообщества с знаком минус
        var GROUP_ID = "-217249761";  // ID вашего сообщества
        
        function sendToBot() {
            var msg = prompt("Введите сообщение:", "привет");
            if (msg) {
                window.open("https://vk.com/im?sel=" + GROUP_ID + "&msg=" + encodeURIComponent(msg), "_blank");
                document.getElementById("info").innerHTML = "✅ Сообщение отправлено! Перейдите в диалог с ботом";
            }
        }
        
        function sendNote() {
            var note = prompt("Введите заметку:");
            if (note) {
                window.open("https://vk.com/im?sel=" + GROUP_ID + "&msg=" + encodeURIComponent("заметка " + note), "_blank");
                document.getElementById("info").innerHTML = "✅ Заметка отправлена!";
            }
        }
        
        function sendWeather() {
            var city = prompt("Введите город:", "Москва");
            if (city) {
                window.open("https://vk.com/im?sel=" + GROUP_ID + "&msg=" + encodeURIComponent("погода " + city), "_blank");
                document.getElementById("info").innerHTML = "🌤 Запрос погоды отправлен!";
            }
        }
        
        // Получаем ID пользователя из URL
        var urlParams = new URLSearchParams(window.location.search);
        var vkUserId = urlParams.get('vk_user_id');
        if (vkUserId) {
            document.getElementById("info").innerHTML = "👤 Ваш ID: " + vkUserId + "<br>Нажмите кнопку, чтобы написать боту";
        }
    </script>
</body>
</html>
