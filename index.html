<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VK Mini App</title>
    <script src="https://vk.com/js/api/openapi.js?169"></script>
</head>
<body>
    <h1>VK Bot Helper</h1>
    <button onclick="send()">Отправить "привет"</button>
    
    <script>
        VK.init({apiId: 54495928});
        
        function send() {
            VK.callMethod("VKWebAppSendMessage", {message: "привет"});
            alert("Отправлено!");
        }
        
        VK.callMethod("VKWebAppGetUserInfo", {}, function(data) {
            document.body.innerHTML += "<p>Ваш ID: " + data.id + "</p>";
        });
    </script>
</body>
</html>
