<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VK Bot Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 500;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #48bb78;
            color: white;
        }
        .btn-info {
            background: #4299e1;
            color: white;
        }
        .btn-link {
            background: #edf2f7;
            color: #4a5568;
        }
        .info {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #4a5568;
        }
        .status {
            background: #e6fffa;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #234e52;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .message-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .message-input input {
            flex: 1;
            margin: 0;
        }
        .message-input button {
            width: auto;
            margin: 0;
            padding: 12px 20px;
        }
        .link-box {
            background: #f7fafc;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            word-break: break-all;
            font-size: 12px;
            text-align: center;
        }
        .copy-btn {
            background: #48bb78;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 10px;
            width: auto;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 VK Bot Helper</h1>
        
        <div class="message-input">
            <input type="text" id="customMessage" placeholder="Введите сообщение...">
            <button class="btn-primary" onclick="sendCustomMessage()">📤 Отправить</button>
        </div>
        
        <button class="btn-secondary" onclick="sendNote()">📝 Отправить заметку</button>
        <button class="btn-info" onclick="sendWeather()">🌤 Узнать погоду</button>
        
        <div class="link-box" id="linkBox">
            🔗 Ссылка для отправки сообщения:
            <div style="margin-top: 8px;">
                <code id="messageLink" style="font-size: 11px;">...</code>
            </div>
            <button class="copy-btn" onclick="copyLink()">📋 Скопировать ссылку</button>
        </div>
        
        <div class="info" id="info">
            💡 Нажмите на кнопку, чтобы отправить сообщение боту
        </div>
        <div class="status" id="status">
            ✅ Приложение готово
        </div>
    </div>
    
    <script>
        // ID вашего сообщества
        var GROUP_ID = "-236570950";
        var currentMessage = "";
        
        // Функция отправки сообщения
        function sendMessage(message) {
            if (!message || !message.trim()) {
                alert("Введите сообщение!");
                return false;
            }
            
            currentMessage = message;
            
            // Формируем ссылку на диалог с ботом
            var url = "https://vk.com/im?sel=" + GROUP_ID;
            
            // Показываем ссылку для копирования
            var fullUrl = url + "&msg=" + encodeURIComponent(message);
            document.getElementById("messageLink").innerHTML = fullUrl;
            
            // Открываем диалог (без автоматического сообщения, так как VK блокирует)
            window.open(url, "_blank");
            
            // Обновляем статус с инструкцией
            var statusDiv = document.getElementById("status");
            statusDiv.innerHTML = "📋 Диалог открыт! Скопируйте ссылку выше и вставьте сообщение вручную, или нажмите 'Скопировать ссылку' и вставьте в адресную строку";
            statusDiv.style.background = "#fefcbf";
            
            // Копируем полную ссылку в буфер
            copyToClipboard(fullUrl);
            
            setTimeout(function() {
                statusDiv.innerHTML = "✅ Диалог открыт! Вставьте сообщение из буфера обмена (Ctrl+V) в поле ввода диалога";
                statusDiv.style.background = "#c6f6d5";
            }, 2000);
            
            return true;
        }
        
        // Копирование в буфер
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function() {
                console.log("Ссылка скопирована:", text);
            });
        }
        
        function copyLink() {
            var link = document.getElementById("messageLink").innerHTML;
            copyToClipboard(link);
            var statusDiv = document.getElementById("status");
            statusDiv.innerHTML = "✅ Ссылка скопирована! Вставьте её в адресную строку браузера (Ctrl+V) и нажмите Enter";
            statusDiv.style.background = "#c6f6d5";
            setTimeout(function() {
                statusDiv.innerHTML = "✅ Приложение готово";
            }, 3000);
        }
        
        function sendCustomMessage() {
            var input = document.getElementById("customMessage");
            var message = input.value;
            if (sendMessage(message)) {
                input.value = "";
            }
        }
        
        function sendNote() {
            var note = prompt("📝 Введите текст заметки:", "Купить продукты");
            if (note && note.trim()) {
                sendMessage("заметка " + note);
            }
        }
        
        function sendWeather() {
            var city = prompt("🌤 Введите город:", "Москва");
            if (city && city.trim()) {
                sendMessage("погода " + city);
            }
        }
        
        // Показываем ID пользователя
        var urlParams = new URLSearchParams(window.location.search);
        var vkUserId = urlParams.get('vk_user_id');
        if (vkUserId) {
            document.getElementById("info").innerHTML = "👤 Ваш VK ID: " + vkUserId + "<br>🤖 ID бота: " + GROUP_ID;
        }
        
        console.log("Mini App загружен. ID сообщества:", GROUP_ID);
    </script>
</body>
</html>
