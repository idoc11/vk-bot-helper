<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bot Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 500;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #48bb78;
            color: white;
        }
        .btn-info {
            background: #4299e1;
            color: white;
        }
        .btn-link {
            background: #edf2f7;
            color: #4a5568;
        }
        .info {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #4a5568;
        }
        .status {
            background: #e6fffa;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #234e52;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .message-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .message-input input {
            flex: 1;
            margin: 0;
        }
        .message-input button {
            width: auto;
            margin: 0;
            padding: 12px 20px;
        }
        .message-preview {
            background: #edf2f7;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
            color: #2d3748;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bot Helper</h1>
        
        <div class="message-input">
            <input type="text" id="customMessage" placeholder="Введите сообщение...">
            <button class="btn-primary" onclick="sendCustomMessage()">📤 Отправить</button>
        </div>
        
        <button class="btn-secondary" onclick="sendNote()">📝 Отправить заметку</button>
        <button class="btn-info" onclick="sendWeather()">🌤 Узнать погоду</button>
        
        <div class="message-preview" id="messagePreview" style="display: none;"></div>
        
        <div class="info" id="info">
            💡 Нажмите на кнопку, чтобы отправить сообщение боту
        </div>
        <div class="status" id="status">
            ✅ Приложение готово
        </div>
    </div>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script>
        var GROUP_ID = -236570950;
        
        // Инициализация VK Bridge
        function initVK() {
            if (typeof vkBridge !== 'undefined') {
                vkBridge.send('VKWebAppInit', {});
            }
        }
        
        // Отправка сообщения через VK API
        async function sendMessageToBot(message) {
            if (!message || !message.trim()) {
                alert("Введите сообщение!");
                return false;
            }
            
            var statusDiv = document.getElementById("status");
            var previewDiv = document.getElementById("messagePreview");
            
            try {
                // Показываем превью
                previewDiv.style.display = "block";
                previewDiv.innerHTML = "📤 Отправка сообщения: <strong>" + message + "</strong>";
                statusDiv.innerHTML = "⏳ Отправка сообщения...";
                statusDiv.style.background = "#fefcbf";
                
                // Пробуем отправить через VK Bridge
                if (typeof vkBridge !== 'undefined') {
                    try {
                        // Метод для открытия диалога и отправки сообщения
                        await vkBridge.send('VKWebAppOpenWallPost', {
                            owner_id: GROUP_ID,
                            message: message
                        });
                        
                        statusDiv.innerHTML = "✅ Сообщение успешно отправлено!";
                        statusDiv.style.background = "#c6f6d5";
                        return true;
                    } catch (bridgeError) {
                        console.log("VK Bridge не сработал:", bridgeError);
                    }
                }
                
                // Запасной вариант: открываем диалог через VK Bridge
                if (typeof vkBridge !== 'undefined') {
                    await vkBridge.send('VKWebAppOpenCommunity', {
                        group_id: Math.abs(GROUP_ID)
                    });
                } else {
                    // Если VK Bridge недоступен, открываем обычную ссылку
                    window.open('https://vk.com/im?sel=' + GROUP_ID, '_blank');
                }
                
                // Копируем сообщение в буфер
                copyToClipboard(message);
                
                statusDiv.innerHTML = "📋 Диалог открыт! Сообщение скопировано в буфер. Вставьте его (Ctrl+V)";
                statusDiv.style.background = "#fefcbf";
                
                setTimeout(function() {
                    statusDiv.innerHTML = "✅ Готово";
                    statusDiv.style.background = "#e6fffa";
                }, 5000);
                
                return true;
                
            } catch (error) {
                console.error("Ошибка отправки:", error);
                statusDiv.innerHTML = "❌ Ошибка отправки";
                statusDiv.style.background = "#fed7d7";
                return false;
            }
        }
        
        // Функция копирования в буфер
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).catch(fallbackCopy);
            } else {
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
            var textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
        }
        
        function sendCustomMessage() {
            var input = document.getElementById("customMessage");
            var message = input.value;
            if (message.trim()) {
                sendMessageToBot(message);
                input.value = "";
            }
        }
        
        function sendNote() {
            var note = prompt("📝 Введите текст заметки:", "Купить продукты");
            if (note && note.trim()) {
                sendMessageToBot("заметка " + note);
            }
        }
        
        function sendWeather() {
            var city = prompt("🌤 Введите город:", "Москва");
            if (city && city.trim()) {
                sendMessageToBot("погода " + city);
            }
        }
        
        // Обработка Enter
        document.getElementById("customMessage").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendCustomMessage();
            }
        });
        
        // Инициализация
        initVK();
        
        // Показываем информацию о пользователе
        var urlParams = new URLSearchParams(window.location.search);
        var vkUserId = urlParams.get('vk_user_id');
        if (vkUserId) {
            document.getElementById("info").innerHTML = "👤 Ваш VK ID: " + vkUserId + "<br>🤖 ID бота: " + GROUP_ID;
        }
        
        console.log("Mini App загружен. ID сообщества:", GROUP_ID);
    </script>
</body>
</html>
