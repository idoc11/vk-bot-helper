<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VK Mini App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://vk.com/js/api/openapi.js?169"></script>
</head>
<body>
    <h1 style="text-align: center; margin-top: 50px;">📱 VK Bot Helper</h1>
    <p id="status" style="text-align: center; padding: 20px;">Загрузка...</p>
    <div style="text-align: center;">
        <button onclick="sendMessage()">💬 Отправить сообщение</button>
        <button onclick="closeApp()">❌ Закрыть</button>
    </div>
    
    <script>
        var statusDiv = document.getElementById("status");
        
        // Функция отправки сообщения
        function sendMessage() {
            var msg = prompt("Введите сообщение:", "привет");
            if (msg) {
                VK.callMethod("VKWebAppSendMessage", {"message": msg});
                statusDiv.innerHTML = "✅ Сообщение отправлено!";
                setTimeout(function() {
                    statusDiv.innerHTML = "Готово к работе";
                }, 2000);
            }
        }
        
        // Закрытие приложения
        function closeApp() {
            VK.callMethod("VKWebAppClose", {"status": "success"});
        }
        
        // Получаем данные пользователя
        VK.callMethod("VKWebAppGetUserInfo", {}, function(data) {
            if (data && data.id) {
                statusDiv.innerHTML = "✅ Приложение работает!<br>👤 Ваш ID: " + data.id;
            }
        });
        
        statusDiv.innerHTML = "✅ Приложение готово к работе!";
    </script>
</body>
</html>
