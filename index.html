<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VK Bot Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #48bb78;
            color: white;
        }
        .btn-info {
            background: #4299e1;
            color: white;
        }
        .info {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #4a5568;
        }
        .status {
            background: #e6fffa;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #234e52;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 VK Bot Helper</h1>
        
        <button class="btn-primary" onclick="sendToBot()">💬 Написать боту</button>
        <button class="btn-secondary" onclick="sendNote()">📝 Отправить заметку</button>
        <button class="btn-info" onclick="sendWeather()">🌤 Узнать погоду</button>
        
        <div class="info" id="info">
            👋 Нажмите на кнопку, чтобы начать общение с ботом
        </div>
        <div class="status" id="status">
            ✅ Приложение готово
        </div>
    </div>
    
    <script>
        // ID вашего сообщества (ЗАМЕНИТЕ НА СВОЙ!)
        // Как получить: https://vk.com/clubXXXXX → ID = -XXXXX
        var GROUP_ID = "-54495928";  // ← ЗАМЕНИТЕ ЭТО НА ID ВАШЕГО СООБЩЕСТВА
        
        // Функция для открытия диалога с ботом
        function openDialog(message) {
            var url = "https://vk.com/im?sel=" + GROUP_ID + "&msg=" + encodeURIComponent(message);
            window.open(url, "_blank");
        }
        
        // Отправка сообщения боту
        function sendToBot() {
            var msg = prompt("Введите сообщение для бота:", "привет");
            if (msg && msg.trim()) {
                openDialog(msg);
                document.getElementById("status").innerHTML = "✅ Сообщение отправлено! Перейдите в диалог с ботом";
                setTimeout(function() {
                    document.getElementById("status").innerHTML = "✅ Приложение готово";
                }, 3000);
            }
        }
        
        // Отправка заметки
        function sendNote() {
            var note = prompt("Введите текст заметки:", "");
            if (note && note.trim()) {
                openDialog("заметка " + note);
                document.getElementById("status").innerHTML = "✅ Заметка отправлена боту!";
                setTimeout(function() {
                    document.getElementById("status").innerHTML = "✅ Приложение готово";
                }, 3000);
            }
        }
        
        // Запрос погоды
        function sendWeather() {
            var city = prompt("Введите город:", "Москва");
            if (city && city.trim()) {
                openDialog("погода " + city);
                document.getElementById("status").innerHTML = "🌤 Запрос погоды отправлен боту!";
                setTimeout(function() {
                    document.getElementById("status").innerHTML = "✅ Приложение готово";
                }, 3000);
            }
        }
        
        // Показываем ID пользователя из URL (если есть)
        var urlParams = new URLSearchParams(window.location.search);
        var vkUserId = urlParams.get('vk_user_id');
        if (vkUserId) {
            document.getElementById("info").innerHTML = "👤 Ваш VK ID: " + vkUserId + "<br>🤖 Бот ответит вам в сообщениях";
        }
        
        console.log("Mini App загружен. GROUP_ID:", GROUP_ID);
    </script>
</body>
</html>
